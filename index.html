<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEAM MOCK TEST - Home</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container text-center">
        <h1>KEAM MOCK TEST</h1>

        <div id="course-selection" class="selection-container">
            <h2>Select Course</h2>
            <div class="button-group">
                <button class="btn primary" onclick="showTests('engineering')">Engineering</button>
                <button class="btn secondary" onclick="showTests('bpharm')">BPharm</button>
            </div>
        </div>

        <div id="test-selection" class="selection-container hidden">
            <h2>Select Test</h2>
            <div id="test-list" class="test-list">
                <!-- Tests will be injected here -->
            </div>
            <button class="btn danger mt-4" onclick="goBack()">Back to Courses</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
